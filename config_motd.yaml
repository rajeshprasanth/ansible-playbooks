---
- name: Manage cockpit files and cleanup
  hosts: "{{ target | default('all') }}"
  become: true

  vars:
    cockpit_motd_path: /etc/motd.d/cockpit
    cockpit_profile_dest: /etc/profile.d/login_info.sh
    cockpit_profile_src: login_info.sh

  tasks:
    - name: Remove cockpit motd directory if exists
      ansible.builtin.file:
        path: "{{ cockpit_motd_path }}"
        state: absent
      tags: [cleanup]

    - name: Copy login_info.sh to /etc/profile.d/
      ansible.builtin.copy:
        src: "{{ cockpit_profile_src }}"
        dest: "{{ cockpit_profile_dest }}"
        mode: '0644'
      tags: [deploy]
