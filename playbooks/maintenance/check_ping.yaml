---
- name: Ping selected target hosts
  hosts: "{{ target | default('all') }}"
  gather_facts: false

  vars:
    ping_msg: "Pinging {{ inventory_hostname }}..."

  tasks:
    - name: Show host being pinged
      debug:
        msg: "{{ ping_msg }}"
      tags: [show]

    - name: Ping the target host
      ansible.builtin.ping:
      tags: [ping]
