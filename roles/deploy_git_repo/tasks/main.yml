# roles/deploy_git_repo/tasks/main.yml

- name: Ensure git is installed
  package:
    name: git
    state: present

- name: Ensure destination directory exists
  file:
    path: "{{ dest_path }}"
    state: directory
    mode: '0755'

- name: Clone the repository
  git:
    repo: "{{ repo_url }}"
    dest: "{{ dest_path }}"
    version: "{{ branch }}"
    update: yes
